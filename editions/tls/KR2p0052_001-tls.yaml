body:
  text: 季康子問于孔子曰肥從有司之後一不知民務之安哉唯子之賜憂請問君子之從事者於民之孔子曰仁之以德此君子大務也康子曰請問何謂仁之以德孔子曰君子在民之上執民之中施教於百姓而民不服焉是君子之恥也是故君子玉其言而成其行敬成其德以臨民民望其道而服焉此之謂仁之以德且管仲有言曰君子恭則遂驕則侮備言多難矣康子曰毋乃肥之聞也是差乎固如吾子之足肥也孔子辭曰子之言也已重丘也聞君子康子曰寧移肥也孔子曰丘聞之孟子餘曰夫書者以著君子之德也夫詩也者以誌君子之志夫儀者以謹君子之行也君子涉之小人觀之君子敬成其德小人晦眛面事皆得其喚而強之則邦有奸動百姓送之以滅速毋恒哉後之世比亂邦相懷毀眾必惡善賢人深厚是故夫迫邦甚難民能易移田肥民則安瘠民不樹是故賢人大於邦而有厚心能為畏者因古典禮而彰之毋逆百事皆請行之安焉作而乘之則邦有穫先之所善亦善之先之所事惡毋事先人之所廢毋起然則民降不善靡父兄子弟而稱讎無難毋忘姑姐妹而遠敬之則民有禮然後奉之以中庸內禮也縈烈今語肥也以處邦家之術曰君子不可以不強不強則不立君子不可以不威不威則民然之毋信玄憎毋信玄憎因邦之所賢而舉之大罪殺之常罪刑之少罪罰之苟能固守而行之民必服矣故子以此言為奚如孔子曰由丘觀之則美言也已且夫烈今之先人世三代之傳史豈敢不以其先人之傳志告康子曰然其囑人亦曰古之為邦之必以此孔子曰言則美矣然異於丘之所聞丘聞之藏文仲有言曰君子強則遺威則民不導滷則失眾礧則亡親好刑則不祥好殺則作亂是故賢人之居邦家也夙興夜寐降端以比民之勸美弃惡毋歸慎小以合大疏言而密守之毋欽遠毋詣逐惡人勿陷好人勿貴救民以親大罪則處之以刑常罪則處之以罰少罪訿之
